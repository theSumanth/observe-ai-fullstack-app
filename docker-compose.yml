services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8080:3000"
    environment:
      - NODE_ENV=production
      - GROQ_API_KEY=${GROQ_API_KEY}
    restart: unless-stopped

  tests:
    build:
      context: .
      dockerfile: Dockerfile
      target: test-runner
    environment:
      - GROQ_API_KEY=test-key-placeholder
      - NODE_ENV=test
    restart: "no"
